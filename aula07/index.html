<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Aula 07 HTML</title>
       </head>
       <body>

        <h2> Trabalhando com links no HTML</h2>

        <!-- Exemplo de URL absoluto -->
         <a href="https://www.spotify.com">Clique aqui para ser redirecionado ao spotify</a>

         <br>

        <!-- Exemplo de URL relativo -->
         <a href="exemplo.html">Clique aqui para abrir uma pagina interna</a>

         <!-- Exemplo de imagem como 
        link -->
        <h2>Ultilizando imagem como link</h2>
          <a href="https://www.github.com.dicesarr">
            <img src="skuba.gif" style="width: 100px;">
          </a>

          <hr>

          <!--Exemplo de link com e-mail-->
          <h2>Ultilizando link para enviar e-mail</h2>

          <a href="Mailto:naellyv61@gmail.com">Enviar E-mail</a>

          <hr>

          <!-- Exemplo de botão para carregar link -->
           <h2>Carregando link com botão</h2>

           <button onclick="document.location='exemplo.html'">Abrindo link</button>

           <hr>

           <!-- Atribuindo o title para um link -->
            <a href="#" title="Clique aqui para carregar um link">Clique aqui!</a>

       </body>
</html>
