            /*Exemplo de link como botão*/
            a:link, a:visited {
                background-color: aliceblue;
                padding: 30px 80px;
                color:darkblue;
                text-decoration: none;
                font-family: Arial, Helvetica, sans-serif;
                font-weight: bold;
                border: 4px solid black;
                display: inline-block;
            }

            a:hover, a:active {
                background-color: black;
                padding: 30px 80px;
                color: bisque;
                text-decoration: none;
                font-family: Arial, Helvetica, sans-serif;
                font-weight: bold;
                border: 4px solid crimson;
                display: inline-block;
                transition: .5s;
            }

        </style>

       <body>

        <!-- Exemplo de estilos em links -->
         <h2>Alterando estilos em links</h2>

         <a href="#####">Clique aqui!</a>

         <!--- Exemplo de link com-->

         <a href="##">Botão</a>
